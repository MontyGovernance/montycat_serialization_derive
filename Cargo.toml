[package]
name = "montycat_serialization_derive"
version = "0.1.2"
edition = "2021"
authors = ["MontyGovernance"]
description = "A derive trait for custom compact serialization/deserialization."
license = "MIT OR Apache-2.0"
readme = "README.md"

[dependencies]
serde = { version = "1.0", features = ["derive"] }
rmp-serde = "1.3.0"
proc-macro2 = "1.0.89"
syn = "2.0.87"
quote = "1.0"

[lib]
proc-macro = true